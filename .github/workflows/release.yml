name: CD - Release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'tailwind.config.js'
      - 'tailwind.ts'

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-release]')"
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Check if version changed
        id: check-version
        run: |
          PACKAGE_VERSION=$(jq -r .version package.json)
          echo "Package version: $PACKAGE_VERSION"
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          
          # Check if git tag exists
          if git rev-parse "v$PACKAGE_VERSION" >/dev/null 2>&1; then
            echo "Tag v$PACKAGE_VERSION already exists"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v$PACKAGE_VERSION does not exist"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Run CI Checks
        if: steps.check-version.outputs.should_publish == 'true'
        run: npm run ci

      - name: Publish to NPM
        if: steps.check-version.outputs.should_publish == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git Tag and Release
        if: steps.check-version.outputs.should_publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.check-version.outputs.version }}"
          
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create and push tag
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
          
          # Create GitHub Release using GitHub CLI
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "Release v$VERSION

          **Install:**
          \`\`\`bash
          npm install @dendelion/mojo-ui@$VERSION
          \`\`\`

          See [CHANGELOG.md](./CHANGELOG.md) for details." \
            --target main
